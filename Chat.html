<!DOCTYPE html>
<html>
<head>
<title>SatyaAI Chatbot</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#chatbox{
width:80%;
max-width:600px;
margin:auto;
margin-top:50px;
}

input{
width:70%;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px;
border:none;
background:#22c55e;
color:white;
border-radius:5px;
cursor:pointer;
}

#messages{
margin-top:20px;
text-align:left;
}
</style>

</head>

<body>

<h1>SatyaAI 🤖</h1>

<div id="chatbox">

<input id="userInput" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>

<div id="messages"></div>

</div>

<script>

function sendMessage(){

let input = document.getElementById("userInput").value
let messages = document.getElementById("messages")

messages.innerHTML += "<p><b>You:</b> "+input+"</p>"

let reply = getReply(input)

messages.innerHTML += "<p><b>SatyaAI:</b> "+reply+"</p>"

document.getElementById("userInput").value=""

}

function getReply(input){

input = input.toLowerCase()

if(input.includes("hello"))
return "Hello 👋 How can I help you?"

if(input.includes("who are you"))
return "I am SatyaAI chatbot."

if(input.includes("bye"))
return "Goodbye 😊"

return "I am still learning."

}

</script>

</body>
</html>
